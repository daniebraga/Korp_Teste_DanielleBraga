<div class="invoices-page space-y-6 pb-14 pt-0 sm:space-y-8 sm:pb-16">
  <header class="page-hero">
    <h1 class="page-title">Notas fiscais</h1>
  </header>

  <section class="invoices-kpis" aria-label="Resumo">
    <div class="invoices-kpis__cell">
      <span class="invoices-kpis__icon" aria-hidden="true">
        <mat-icon class="!text-[20px]">receipt_long</mat-icon>
      </span>
      <div class="invoices-kpis__meta">
        <p class="invoices-kpis__label">Total</p>
        <p class="invoices-kpis__value">{{ invoicesTotal() }}</p>
      </div>
    </div>
    <div class="invoices-kpis__cell">
      <span class="invoices-kpis__icon" aria-hidden="true">
        <mat-icon class="!text-[20px]">lock_open</mat-icon>
      </span>
      <div class="invoices-kpis__meta">
        <p class="invoices-kpis__label">Abertas</p>
        <p class="invoices-kpis__value invoices-kpis__value--accent">{{ openCount() }}</p>
      </div>
    </div>
    <div class="invoices-kpis__cell">
      <span class="invoices-kpis__icon invoices-kpis__icon--muted" aria-hidden="true">
        <mat-icon class="!text-[20px]">lock</mat-icon>
      </span>
      <div class="invoices-kpis__meta">
        <p class="invoices-kpis__label">Fechadas</p>
        <p class="invoices-kpis__value">{{ closedCount() }}</p>
      </div>
    </div>
    <div class="invoices-kpis__cell">
      <span class="invoices-kpis__icon invoices-kpis__icon--muted" aria-hidden="true">
        <mat-icon class="!text-[20px]">format_list_numbered</mat-icon>
      </span>
      <div class="invoices-kpis__meta">
        <p class="invoices-kpis__label">Linhas</p>
        <p class="invoices-kpis__value">{{ totalLines() }}</p>
      </div>
    </div>
  </section>

  <section class="ui-card min-h-0">
    <div class="ui-card__head">
      <div>
        <h2 class="ui-card__title">Notas</h2>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <button mat-flat-button color="primary" type="button" (click)="openNewInvoiceDialog()" class="!h-9 !rounded-lg !text-sm !font-medium">
          <mat-icon class="!mr-1 !text-[18px]">note_add</mat-icon>
          Nova nota
        </button>
        <button mat-stroked-button type="button" (click)="reloadAll()" [disabled]="loading()" class="!h-9 !rounded-lg !border-gray-300 !text-xs">
          <mat-icon class="!mr-1 !text-[16px]">refresh</mat-icon>
          Atualizar
        </button>
      </div>
    </div>
    <div class="overflow-x-auto px-4 pb-5 sm:px-6">
      <table mat-table [dataSource]="invoices()" class="invoices-table mat-elevation-z0 w-full min-w-[440px]">
        <ng-container matColumnDef="sequentialNumber">
          <th mat-header-cell *matHeaderCellDef>Nº</th>
          <td mat-cell *matCellDef="let n" class="font-medium tabular-nums text-gray-900">{{ n.sequentialNumber }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let n">
            <span
              class="inline-flex rounded-md px-2 py-0.5 text-xs font-medium"
              [class.bg-emerald-50]="n.status === 'Aberta'"
              [class.text-emerald-800]="n.status === 'Aberta'"
              [class.bg-gray-100]="n.status === 'Fechada'"
              [class.text-gray-700]="n.status === 'Fechada'"
            >
              {{ n.status }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="items">
          <th mat-header-cell *matHeaderCellDef class="!text-right">Itens</th>
          <td mat-cell *matCellDef="let n" class="tabular-nums !text-right text-gray-700">{{ n.lines.length }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="!text-right"></th>
          <td mat-cell *matCellDef="let n" class="!text-right">
            <a mat-button color="primary" [routerLink]="['/notas', n.id]" class="!min-w-0 !px-2 !text-sm !font-medium">Abrir</a>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </section>
</div>
