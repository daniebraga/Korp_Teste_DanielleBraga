<h1>Cadastro de produtos</h1>
<p class="muted">Dados persistidos no microsserviço de estoque (SQLite).</p>

<mat-card class="card">
  <mat-card-title>Novo produto</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" class="grid" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Código</mat-label>
        <input matInput formControlName="code" />
        <mat-hint>Obrigatório</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="span-2">
        <mat-label>Descrição</mat-label>
        <input matInput formControlName="description" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Saldo</mat-label>
        <input matInput type="number" formControlName="balance" />
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" type="submit">Salvar</button>
        <button mat-stroked-button type="button" (click)="suggest()">
          <mat-icon>lightbulb_outline</mat-icon>
          Assistente (demo)
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<mat-card class="card">
  <mat-card-title>Estoque atual</mat-card-title>
  <mat-card-content>
    <div class="toolbar-row">
      <button mat-stroked-button type="button" (click)="refresh()" [disabled]="loading()">
        <mat-icon>refresh</mat-icon>
        Atualizar
      </button>
    </div>

    <table mat-table [dataSource]="products()" class="mat-elevation-z1 table">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let p">{{ p.code }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let p">{{ p.description }}</td>
      </ng-container>
      <ng-container matColumnDef="balance">
        <th mat-header-cell *matHeaderCellDef>Saldo</th>
        <td mat-cell *matCellDef="let p">{{ p.balance }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
