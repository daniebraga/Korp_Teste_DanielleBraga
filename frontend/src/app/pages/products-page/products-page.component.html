<div class="space-y-4">
  <div>
    <h1 class="text-3xl font-semibold mb-2">Cadastro de produtos</h1>
    <p class="muted">Dados persistidos no microsserviço de estoque (SQLite).</p>
  </div>

  <mat-card class="card p-6">
    <mat-card-title class="text-xl font-semibold mb-4">{{ editingProduct() ? 'Editar produto' : 'Novo produto' }}</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" class="grid gap-4 md:grid-cols-3" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Código</mat-label>
          <input matInput formControlName="code" />
          <mat-hint>Obrigatório</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full md:col-span-2">
          <mat-label>Descrição</mat-label>
          <input matInput formControlName="description" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Saldo</mat-label>
          <input matInput type="number" formControlName="balance" />
        </mat-form-field>

        <div class="actions md:col-span-3">
          <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
            <mat-icon>{{ editingProduct() ? 'save' : 'add' }}</mat-icon>
            {{ editingProduct() ? 'Salvar alterações' : 'Salvar' }}
          </button>
          <button mat-stroked-button type="button" (click)="suggest()" [disabled]="saving()">
            <mat-icon>lightbulb_outline</mat-icon>
            Assistente
          </button>
          <button mat-stroked-button type="button" *ngIf="editingProduct()" (click)="cancelEdit()">
            <mat-icon>close</mat-icon>
            Cancelar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="card p-6">
    <mat-card-title class="text-xl font-semibold mb-4">Estoque atual</mat-card-title>
    <mat-card-content>
      <div class="toolbar-row mb-4">
        <button mat-stroked-button type="button" (click)="refresh()" [disabled]="loading()">
          <mat-icon>refresh</mat-icon>
          Atualizar
        </button>
      </div>

      <table mat-table [dataSource]="products()" class="mat-elevation-z1 table">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Código</th>
          <td mat-cell *matCellDef="let p">{{ p.code }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descrição</th>
          <td mat-cell *matCellDef="let p">{{ p.description }}</td>
        </ng-container>
        <ng-container matColumnDef="balance">
          <th mat-header-cell *matHeaderCellDef>Saldo</th>
          <td mat-cell *matCellDef="let p">{{ p.balance }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button color="primary" type="button" (click)="startEdit(p)">
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              type="button"
              [disabled]="deletingProductId() === p.id"
              (click)="deleteProduct(p)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
