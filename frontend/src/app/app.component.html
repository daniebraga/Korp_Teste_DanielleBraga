<!-- Estilo portal: sidebar clara, verde esmeralda, conteúdo em fundo cinza suave -->
<div
  class="app-shell flex min-h-screen min-h-[100dvh] w-full max-w-[100vw] flex-col overflow-x-hidden bg-gray-50"
  [class.app-shell--drawer-open]="mobileNavOpen()"
>
  @if (mobileNavOpen()) {
    <button type="button" class="sidebar-scrim md:hidden" (click)="closeMobileNav()" aria-label="Fechar menu"></button>
  }

  <button
    type="button"
    class="drawer-fab md:hidden"
    (click)="toggleMobileNav()"
    [attr.aria-expanded]="mobileNavOpen()"
    aria-controls="app-sidebar-nav"
    aria-label="Abrir ou fechar menu"
  >
    <mat-icon>{{ mobileNavOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>

  <div class="app-body flex min-h-0 min-h-[100dvh] w-full min-w-0 flex-1 flex-row">
    <aside id="app-sidebar-nav" class="app-sidebar" aria-label="Navegação principal">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <span class="sidebar-brand-icon" aria-hidden="true">
            <mat-icon>eco</mat-icon>
          </span>
          <div class="sidebar-brand-text">
            <span class="sidebar-app-name">Korp</span>
            <span class="sidebar-app-tag">NF · demo</span>
          </div>
        </div>

        <div class="sidebar-user">
          <p class="sidebar-user-name">Operador demo</p>
          <p class="sidebar-user-email">empresa&#64;demo.local</p>
        </div>
      </div>

      <nav class="sidebar-nav-wrap" aria-label="Menu">
        <ul class="sidebar-menu">
          <li>
            <a
              routerLink="/produtos"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="sidebar-menu-link"
              (click)="closeMobileNav()"
            >
              <mat-icon class="sidebar-menu-icon">inventory_2</mat-icon>
              <span>Produtos</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/notas"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: false }"
              class="sidebar-menu-link"
              (click)="closeMobileNav()"
            >
              <mat-icon class="sidebar-menu-icon">receipt_long</mat-icon>
              <span>Notas fiscais</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <p class="sidebar-footnote">Microsserviços de estoque e faturamento — ambiente de demonstração.</p>
      </div>
    </aside>

    <div class="app-main-column flex min-h-0 min-w-0 flex-1 flex-col">
      <main
        class="app-content min-h-0 flex-1 px-4 py-6 pl-14 pt-16 sm:px-6 md:px-8 md:py-10 md:pl-8 md:pt-10 lg:px-10"
      >
        <div class="mx-auto w-full max-w-[88rem]">
          <router-outlet />
        </div>
      </main>
    </div>
  </div>
</div>
